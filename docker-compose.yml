services:
  daily-planner:
    build:
      context: .
    image: daily-planner:local
    restart: unless-stopped
    environment:
      PLANNER_DB_PATH: /data/planner.db
      PROJECT_MGMT_DB_PATH: /data/project_mgmt.db
    ports:
      - "${DAILY_PLANNER_PORT:-8080}:8000"
    volumes:
      - daily_planner_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  daily_planner_data:
